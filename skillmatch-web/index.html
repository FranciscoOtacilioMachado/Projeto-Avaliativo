<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles/index.style.css">
    <title>SkillMatch - Projeto Avaliativo</title>  
    <meta name="description" content="Sistema que compara o perfil do candidato com vagas de front-end e calcula o percentual de compatibilidade.">
</head>
<body>

    <header>
        <img src="./assets/img/Copilot_20260712_162428.png" alt="Logo da SkillMatch">
    </header>

    <main>
        <section aria-label="Formulário de perfil">
            <h1>Encontre sua vaga ideal aqui</h1>

            <form id="form-perfil">
                <label for="nome">Nome:</label>
                <input type="text" name="nome" id="nome">

                <label for="area">Área:</label>
                <input type="text" name="area" id="area">

                <label for="habilidades">Habilidade:</label>
                <input type="text" name="habilidades" id="habilidades" placeholder="EX: HTML, CSS, JavaScript">

                <label for="experiencia">Experiência:</label>
                <input type="number" name="experiencia" id="experiencia">    
                
                <button type="submit">Enviar</button>
            </form>
        </section>

        <section aria-label="Resultados da análise">
            <div id="area-resultados"></div>
        </section>
    </main>

    <footer>

    </footer>
    
    <script type="module" src="./assets/scripts/main.js"></script>
</body>
</html>
